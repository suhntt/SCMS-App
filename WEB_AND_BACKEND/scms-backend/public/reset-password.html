<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - SCMS</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0F172A; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
    .card { background: #1E293B; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
    h1 { margin-top: 0; font-size: 24px; color: #F59E0B; }
    p { color: #94A3B8; font-size: 14px; margin-bottom: 24px; }
    input { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 8px; border: 1px solid #334155; background: #0F172A; color: #fff; box-sizing: border-box; font-size: 16px; }
    input:focus { outline: none; border-color: #F59E0B; }
    button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: linear-gradient(135deg, #F59E0B, #D97706); color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
    button:hover { filter: brightness(1.1); }
    .message { margin-top: 16px; font-size: 14px; min-height: 20px; }
    .success { color: #10B981; }
    .error { color: #EF4444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create New Password</h1>
    <p>Please enter your new password below.</p>
    
    <input type="password" id="new-password" placeholder="New Password" />
    <input type="password" id="confirm-password" placeholder="Confirm Password" />
    
    <button id="reset-btn" onclick="submitReset()">Reset Password</button>
    <div id="message" class="message"></div>
  </div>

  <script>
    async function submitReset() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const messageEl = document.getElementById('message');
      const btn = document.getElementById('reset-btn');

      if (!token) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Invalid or missing reset token. Please request a new link.';
        return;
      }

      if (!newPassword || !confirmPassword) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Both fields are required.';
        return;
      }

      if (newPassword !== confirmPassword) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const response = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await response.json();

        if (data.success) {
          messageEl.className = 'message success';
          messageEl.textContent = 'Password reset successful! You can now login on the app.';
          document.getElementById('new-password').style.display = 'none';
          document.getElementById('confirm-password').style.display = 'none';
          btn.style.display = 'none';
        } else {
          messageEl.className = 'message error';
          messageEl.textContent = data.message || 'An error occurred. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (err) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
